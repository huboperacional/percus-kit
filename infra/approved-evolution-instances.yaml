# Allowlist de Evolution WhatsApp instances aprovadas pra `auth.audiences.whatsapp_config.instance_name`
#
# Status check `audience-config-lint` (workflow .github/workflows/audience-config-lint.yml no auth-service repo)
# valida que toda audience com `whatsapp_provider='evolution_self'` usa `instance_name` listado aqui.
#
# Adicionar nova instance = PR no percus-kit + 1 approval auth-team.
#
# Referência: PADRAO_AUTH_SERVICE_INTEGRATION_V2.md Seção D
# Última atualização: 2026-05-15

instances:
  - name: Auth_Todos
    purpose: OTP transacional compartilhado Percus (audiences low-volume + piloto/dev)
    audiences:
      - familia
      - painel
      - paid-media
      - coach
    notes: |
      Default pra audience nova low-volume. Migrar pra instance própria
      quando volume >100 OTP/dia OU compliance LGPD exigir isolamento.

  - name: Plexco
    purpose: OTP transacional Plexco Tasks (instance própria, isolamento de canal)
    audiences:
      - plexco-tasks
    notes: |
      Adotada em 2026-05-15 (sessão 36 do Plexco Tasks).
      Motivo: separar OTP transacional do canal Auth_Todos que é usado
      como playground de teste manual do estúdio.
